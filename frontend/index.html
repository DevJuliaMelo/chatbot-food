<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot iFood - RAG com LangChain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 680px;
      padding: 16px;
    }

    header {
      text-align: center;
      margin-bottom: 16px;
    }

    header h1 {
      font-size: 1.4rem;
      color: #ea1d2c;
    }

    header p {
      font-size: 0.85rem;
      color: #666;
      margin-top: 4px;
    }

    .chat-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      height: 520px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.92rem;
      line-height: 1.5;
    }

    .message.bot {
      background: #f0f0f0;
      color: #222;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #ea1d2c;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.loading {
      background: #f0f0f0;
      color: #888;
      align-self: flex-start;
      font-style: italic;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #eee;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #ea1d2c;
    }

    .input-area button {
      background: #ea1d2c;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #c9161f; }
    .input-area button:disabled { background: #ccc; cursor: not-allowed; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .suggestions button {
      background: #fff;
      border: 1px solid #ea1d2c;
      color: #ea1d2c;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestions button:hover {
      background: #ea1d2c;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Chatbot iFood</h1>
      <p>Recomendação de restaurantes com RAG + LangChain + Groq</p>
    </header>

    <div class="suggestions">
      <button onclick="enviar('Qual restaurante japonês você recomenda?')">Restaurante japonês</button>
      <button onclick="enviar('Quero algo barato')">Opção barata</button>
      <button onclick="enviar('Tem opção vegana?')">Opção vegana</button>
      <button onclick="enviar('Melhor avaliado?')">Melhor avaliado</button>
    </div>

    <div class="chat-box">
      <div class="messages" id="messages">
        <div class="message bot">
          Olá! Sou o assistente de restaurantes do iFood. Como posso ajudar você hoje?
        </div>
      </div>
      <div class="input-area">
        <input
          type="text"
          id="input"
          placeholder="Digite sua pergunta..."
          onkeydown="if(event.key==='Enter') enviar()"
        />
        <button id="btn" onclick="enviar()">Enviar</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "SUA_URL_DO_RENDER";

    async function enviar(texto) {
      const input = document.getElementById("input");
      const btn = document.getElementById("btn");
      const pergunta = texto || input.value.trim();
      if (!pergunta) return;

      input.value = "";
      btn.disabled = true;
      adicionarMensagem(pergunta, "user");

      const loading = adicionarMensagem("Digitando...", "loading");

      try {
        const res = await fetch(`${API_URL}/perguntar`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pergunta })
        });
        const data = await res.json();
        loading.remove();
        adicionarMensagem(data.resposta, "bot");
      } catch {
        loading.remove();
        adicionarMensagem("Erro ao conectar com o servidor. Tente novamente.", "bot");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    function adicionarMensagem(texto, tipo) {
      const messages = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `message ${tipo}`;
      div.textContent = texto;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }
  </script>
</body>
</html>
